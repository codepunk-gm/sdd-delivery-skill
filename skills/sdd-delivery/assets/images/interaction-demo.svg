<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Friendly guided interaction demo">
  <defs><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1e3a8a" flood-opacity="0.12"/></filter></defs>
  <rect width="1600" height="900" rx="34" fill="#f8fbff"/>
  <text x="60" y="86" font-family="Inter, Segoe UI, Arial" font-size="48" font-weight="850" fill="#0f172a">Friendly Guided Interaction</text>
  <text x="60" y="132" font-family="Inter, Segoe UI, Arial" font-size="24" fill="#475569">Users can choose a number, send a PRD, or continue from a checkpoint</text>
  <g font-family="Inter, Segoe UI, Arial" font-size="20"><rect x="920" y="60" width="120" height="48" rx="14" fill="#eff6ff" stroke="#93c5fd"/><text x="954" y="91" fill="#2563eb" font-weight="700">Guided</text><rect x="1065" y="60" width="245" height="48" rx="14" fill="#f5f3ff" stroke="#c4b5fd"/><text x="1100" y="91" fill="#5b21b6" font-weight="700">No Python Mode Ready</text><rect x="1335" y="60" width="180" height="48" rx="14" fill="#ecfdf5" stroke="#86efac"/><text x="1370" y="91" fill="#15803d" font-weight="700">Checkpoint Safe</text></g>
  <rect x="35" y="160" width="350" height="680" rx="24" fill="#fff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="150" y="225" font-family="Inter, Segoe UI, Arial" font-size="28" font-weight="800" fill="#0f172a">SDD Delivery</text>
  <text x="150" y="260" font-family="Inter, Segoe UI, Arial" font-size="20" fill="#64748b">AI Coding Agent</text>
  <g font-family="Inter, Segoe UI, Arial" font-size="18"><rect x="65" y="310" width="280" height="82" rx="16" fill="#eff6ff" stroke="#93c5fd"/><circle cx="105" cy="351" r="28" fill="#2563eb"/><text x="99" y="359" fill="#fff" font-weight="800">1</text><text x="155" y="343" font-weight="800" fill="#1e3a8a">PRD</text><text x="155" y="373" fill="#475569">Define goals &amp; scope</text><text x="105" y="465" fill="#1e3a8a" font-weight="700">2</text><text x="155" y="465" fill="#0f172a" font-weight="700">Spec</text><text x="105" y="545" fill="#1e3a8a" font-weight="700">3</text><text x="155" y="545" fill="#0f172a" font-weight="700">Review</text><text x="105" y="625" fill="#1e3a8a" font-weight="700">4</text><text x="155" y="625" fill="#0f172a" font-weight="700">Solution</text><text x="105" y="705" fill="#1e3a8a" font-weight="700">5</text><text x="155" y="705" fill="#0f172a" font-weight="700">Code</text></g>
  <rect x="410" y="160" width="1155" height="680" rx="24" fill="#fff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <g font-family="Inter, Segoe UI, Arial"><text x="520" y="220" font-size="22" font-weight="800" fill="#2563eb">User</text><rect x="510" y="236" width="890" height="62" rx="12" fill="#eff6ff" stroke="#93c5fd"/><text x="540" y="275" font-size="22" fill="#0f172a">Use SDD Delivery for this PRD</text><text x="520" y="360" font-size="22" font-weight="800" fill="#15803d">Assistant</text><rect x="510" y="380" width="890" height="270" rx="14" fill="#f0fdf4" stroke="#86efac"/><text x="540" y="420" font-size="22" fill="#0f172a">I can guide this with SDD Delivery:</text><text x="565" y="460" font-size="20" fill="#0f172a">1. PRD to Spec</text><text x="565" y="492" font-size="20" fill="#0f172a">2. Spec Review</text><text x="565" y="524" font-size="20" fill="#0f172a">3. Technical Solution</text><text x="565" y="556" font-size="20" fill="#0f172a">4. Solution Review</text><text x="565" y="588" font-size="20" fill="#0f172a">5. Implementation Tasks</text><text x="565" y="620" font-size="20" fill="#0f172a">... 10. Checkpoint / Handoff</text><text x="540" y="705" font-size="22" font-weight="800" fill="#2563eb">User</text><rect x="510" y="724" width="890" height="54" rx="12" fill="#eff6ff" stroke="#93c5fd"/><text x="540" y="758" font-size="22" fill="#0f172a">1</text><text x="520" y="830" font-size="22" font-weight="800" fill="#15803d">Assistant</text><rect x="650" y="790" width="720" height="84" rx="14" fill="#f0fdf4" stroke="#22c55e"/><text x="690" y="825" font-size="22" font-weight="800" fill="#0f172a">Phase: PRD to Spec</text><text x="690" y="855" font-size="18" fill="#15803d">Output: 00-prd.md, 01-spec.md, 03-requirement-trace.md</text></g>
</svg>
